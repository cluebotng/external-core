name: CI
on: { pull_request: { } }
concurrency:
  group: ${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  setup-build:
    uses: infrabits/ci-setup-tox-env/.github/workflows/setup.yml@541da38f95bc05d926ce24f5c5bcf3951907dabd # main

  execute-lint:
    needs: [setup-build]
    uses: infrabits/ci-run-tox-env/.github/workflows/run.yml@19f9bbd03df394ba63d7644e7afa80dcf6adfb2a # main
    with:
      environments: ${{ needs.setup-build.outputs.lint }}

  build-container:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build container
        uses: infrabits/ci-pack@c72247fc9ba1598090115c1d099e5c779b8bc79c # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image: ghcr.io/${{ github.repository }}:${{ github.sha }}
          use_builder: latest

  test-container:
    runs-on: ubuntu-latest
    needs: [build-container]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Start container
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker run -d -p 3565:3565 ghcr.io/${{ github.repository }}:${{ github.sha }} ./cluebotng -l -m live_run
          timeout 30 bash -c 'until nc -w 1 127.0.0.1 3565 2>/dev/null | grep -q "<WPEditSet>"; do sleep 1; done'

      - name: Verify a vandalised edit
        run: |
          result=$(nc -q 10 127.0.0.1 3565 < .github/data/bad_edit.xml)
          echo "${result}"
          echo "${result}" | grep -q '<think_vandalism>true</think_vandalism>'

      - name: Verify a clean edit
        run: |
          result=$(nc -q 10 127.0.0.1 3565 < .github/data/good_edit.xml)
          echo "${result}"
          echo "${result}" | grep -q '<think_vandalism>false</think_vandalism>'
